## Static configuration
log:
  level: INFO

api:
  dashboard: true
  insecure: true  # OK for local dev; disable in prod

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: btk_net
  file:
    directory: /etc/traefik/dynamic
    watch: true
